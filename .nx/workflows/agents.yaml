launch-templates:
  custom-linux-medium-plus-js:
    resourceClass: 'docker_linux_amd64/medium+'
    image: 'ubuntu22.04-node20.19-v2'
    init-steps:
      - name: checkout repo
        uses: 'nrwl/nx-cloud-workflows/v5/workflow-steps/checkout/main.yaml'
        env:
          GIT_FETCH_TAGS: 'true'
      - name: Set git data for e2e test repos
        script: |
          git config --global user.email "john.doe@example.com"
          git config --global user.name "John Doe"
      - name: Install Node
        uses: 'nrwl/nx-cloud-workflows/v4/workflow-steps/install-node/main.yaml'
      - name: Print node version
        script: node --version
      - name: node_modules cache
        uses: 'nrwl/nx-cloud-workflows/v5/workflow-steps/cache/main.yaml'
        inputs:
          key: 'pnpm-lock.yaml'
          paths: 'node_modules'
          baseBranch: 'main'
      - name: NPM Install
        uses: 'nrwl/nx-cloud-workflows/v5/workflow-steps/install-node-modules/main.yaml'
        env:
          SKIP_POSTINSTALL: 'true'
      - name: '[DEBUG] Check git hooks after install'
        script: |
          echo "=== .git/hooks/ contents ==="
          ls -la .git/hooks/ || echo "No .git/hooks/ directory"
          echo ""
          echo "=== .git/hooks/commit-msg ==="
          cat .git/hooks/commit-msg 2>/dev/null || echo "No commit-msg hook"
          echo ""
          echo "=== .git/hooks/prepare-commit-msg ==="
          cat .git/hooks/prepare-commit-msg 2>/dev/null || echo "No prepare-commit-msg hook"
          echo ""
          echo "=== .husky/ contents ==="
          ls -la .husky/ 2>/dev/null || echo "No .husky/ directory"
          echo ""
          echo "=== .husky/commit-msg ==="
          cat .husky/commit-msg 2>/dev/null || echo "No .husky/commit-msg hook"
          echo ""
          echo "=== .husky/prepare-commit-msg ==="
          cat .husky/prepare-commit-msg 2>/dev/null || echo "No .husky/prepare-commit-msg hook"
          echo ""
          echo "=== core.hooksPath git config ==="
          git config core.hooksPath || echo "core.hooksPath not set"
