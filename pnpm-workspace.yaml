packages:
  - 'packages/*'
catalog:
  '@angular/cli': '22.0.5'
  '@angular/compiler': '22.0.0'
  '@commitlint/cli': '21.2.0'
  '@commitlint/config-conventional': '21.2.0'
  '@eslint/core': '1.2.1'
  '@eslint/js': '10.0.1'
  '@mdn/browser-compat-data': '8.0.1'
  '@nx/devkit': '22.7.5'
  '@nx/esbuild': '22.7.5'
  '@nx/eslint': '22.7.5'
  '@nx/eslint-plugin': '22.7.5'
  '@nx/js': '22.7.5'
  '@nx/plugin': '22.7.5'
  '@nx/vite': '22.7.5'
  '@nx/workspace': '22.7.5'
  '@schematics/angular': '22.0.5'
  '@swc-node/register': '1.11.1'
  '@swc/cli': '0.8.1'
  '@swc/core': '1.15.43'
  '@swc/helpers': '0.5.23'
  '@types/aria-query': '5.0.4'
  '@types/node': '25.9.4'
  '@types/semver': '^7.5.8'
  '@types/yargs': '^17.0.33'
  '@vitest/coverage-v8': '4.1.7'
  cz-conventional-changelog: '3.3.0'
  esbuild: '^0.28.0'
  eslint: '10.4.1'
  eslint-config-prettier: '10.1.5'
  execa: '5.1.1'
  husky: '9.1.7'
  json-schema-to-typescript: '15.0.4'
  json-schema-traverse: '1.0.0'
  jsonc-eslint-parser: '2.4.2'
  lint-staged: '17.0.8'
  ncp: '2.0.0'
  nx: '22.7.5'
  picocolors: '1.1.1'
  pkg-pr-new: '0.0.75'
  prettier: '3.8.3'
  tree-kill: '1.2.2'
  ts-node: '10.9.2'
  tslib: '^2.4.1'
  tsx: '4.22.4'
  typescript: '6.0.3'
  verdaccio: '6.7.4'
  vite: '^8.0.0'
  vitest: '4.1.7'
  yargs: '18.0.0'
catalogMode: 'prefer'
catalogs:
  other-runtime-dependencies:
    '@angular/cli': '>= 22.0.0 < 23.0.0'
    '@angular-devkit/architect': '>= 0.2200.0 < 0.2300.0'
    '@angular-devkit/core': '>= 22.0.0 < 23.0.0'
    '@angular-devkit/schematics': '>= 22.0.0 < 23.0.0'
    aria-query: '5.3.2'
    axobject-query: '4.1.0'
    eslint-scope: '9.1.2'
    ignore: '7.0.5'
    semver: '7.8.5'
    strip-json-comments: '3.1.1'
    ts-api-utils: '^2.1.0'
  typescript-eslint:
    '@typescript-eslint/rule-tester': '8.60.1'
    '@typescript-eslint/types': '8.60.1'
    '@typescript-eslint/utils': '8.60.1'
    typescript-eslint: '8.60.1'
cleanupUnusedCatalogs: true
# TODO: Remove this
# pnpm 11 enforces a default minimumReleaseAge of 1440 minutes (1 day). This
# version of @types/node was published <24h before our CI install, so it trips
# the supply-chain gate. Scoped exception (exact version) so it self-expires on
# the next bump and forces re-evaluation.
minimumReleaseAgeExclude:
  - '@types/node@25.9.2'
allowBuilds:
  '@swc/core': true
  core-js: false
  esbuild: true
  nx: true
  unrs-resolver: true
patchedDependencies:
  '@typescript-eslint/rule-tester': 'tools/patches/@typescript-eslint__rule-tester.patch'
